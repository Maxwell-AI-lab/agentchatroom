<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 Multi-Agent Chat Room</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <h2>🤖 Agent Chat</h2>

      <div class="panel">
        <h3>Agents</h3>
        <div id="agent-list"></div>
        <button class="btn add-btn" onclick="showAddForm()">+ 添加 Agent</button>
      </div>

      <!-- Add/Edit form (hidden by default) -->
      <div id="agent-form" class="panel" style="display:none">
        <h3 id="form-title">添加 Agent</h3>
        <label>名字 <input id="f-name" placeholder="给 Agent 取个名字" maxlength="20" /></label>
        <label>人设 <textarea id="f-personality" placeholder="描述 Agent 的性格和背景…" rows="3"></textarea></label>
        <label>头像 <input id="f-avatar" placeholder="一个 emoji" maxlength="2" value="🤖" /></label>
        <label>颜色 <input id="f-color" type="color" value="#6366f1" /></label>
        <div class="btn-group">
          <button class="btn primary" id="form-submit" onclick="submitForm()">确定</button>
          <button class="btn" onclick="hideForm()">取消</button>
        </div>
      </div>

      <div class="panel">
        <h3>Settings</h3>
        <label>话题 <input id="topic" value="深度讨论AI群体智能涌现" placeholder="讨论话题" /></label>
        <label>轮数 <input id="rounds" type="number" value="3" min="1" max="20" /></label>
        <div class="btn-group">
          <button id="btn-start" class="btn primary" onclick="startChat()">▶ 开始</button>
          <button id="btn-pause" class="btn" onclick="pauseChat()" disabled>⏸ 暂停</button>
          <button id="btn-resume" class="btn primary" onclick="resumeChat()" style="display:none">▶ 继续</button>
          <button id="btn-stop" class="btn danger" onclick="stopChat()" disabled>⏹ 终止</button>
        </div>
        <div class="btn-group">
          <button class="btn" onclick="clearChat()">🗑 清空</button>
          <button class="btn" onclick="resetAgents()">↺ 恢复默认</button>
        </div>
      </div>

      <div class="panel status-panel">
        <span id="status-indicator" class="dot idle"></span>
        <span id="status-text">等待开始</span>
      </div>
    </aside>

    <!-- Main content -->
    <main id="chat-area">
      <div id="messages"></div>
      <form id="user-input-bar" onsubmit="sendUserMessage(event)">
        <input id="user-input" type="text" placeholder="说点什么参与讨论…" autocomplete="off" />
        <button type="submit" class="btn primary">发送</button>
      </form>
    </main>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
